version: 2

models:
  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: total_payment_value
        tests:
          - not_null:
              severity: warn
            
  - name: dim_customer
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_product
    columns:
      - name: product_key
        tests:
          - not_null

  - name: dim_seller
    columns:
      - name: seller_key
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - unique
          - not_null